<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>
</head>

<body>
    <nav class="navbar">
        <strong>🚀 TechStore</strong>
        <div id="nav-auth">
            <span id="display-user"></span>
            <button onclick="logout()" style="width:auto; background:#ef4444; margin-left:10px">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- SEZIONE LOGIN/REG -->
        <div id="auth-section" class="card">
            <h2 id="auth-title">Login</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <div id="reg-fields" class="hidden">
                <input type="text" id="name" placeholder="Nome Completo">
            </div>
            <button id="btn-auth" onclick="handleAuth()">Accedi</button>
            <p style="text-align:center; cursor:pointer" onclick="toggleAuthMode()" id="auth-toggle">Non hai un account?
                Registrati</p>
        </div>

        <!-- SEZIONE SHOP -->
        <div id="shop-section" class="hidden">
            <div class="card" style="margin-bottom:2rem">
                <h3>Il tuo Saldo: <span id="user-credits" class="badge">0</span> Crediti</h3>
            </div>
            <h2>Catalogo Prodotti</h2>
            <div id="products-grid" class="grid"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
